<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Chess VS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/chess.css" />
</head>
<body>
  <div id="app">

    <div id="header">
      <h1>Chess <span class="accent">vs</span> AI</h1>
    </div>

    <div id="difficulty-bar">
      <button class="diff-btn" data-diff="casual">Casual</button>
      <button class="diff-btn" data-diff="ultra">Ultra</button>
    </div>

    <div id="sf-status"></div>
    <div id="status-bar">Loading...</div>

    <div id="board-wrap">
      <div id="board-container">
        <div id="board"></div>
        <div id="result-overlay">
          <div id="result-text"></div>
          <div id="result-btns">
            <button class="btn-overlay secondary" onclick="requestAnalysis()">Analyze</button>
            <button class="btn-overlay primary" onclick="resetGame()">Rematch</button>
          </div>
        </div>
      </div>
    </div>

    <div id="controls">
      <button class="ctrl" id="btn-undo" onclick="undoMove()">Undo</button>
      <button class="ctrl accent" id="btn-hint" onclick="requestHint()">Hint</button>
      <button class="ctrl" onclick="flipBoard()">Flip</button>
      <button class="ctrl" onclick="resetGame()">New Game</button>
    </div>

    <div id="commentary-wrap">
      <div id="commentary-text" class="muted">Make your first move.</div>
    </div>

    <div id="move-log-wrap">
      <div id="move-log"></div>
    </div>

    <div id="analysis-wrap">
      <div id="analysis-title">Post-Game Analysis</div>
      <div id="analysis-text"></div>
    </div>

  </div>

  <script src="js/chess-engine.js"></script>
  <script src="js/stockfish-bridge.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
