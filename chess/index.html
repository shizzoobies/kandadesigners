<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Claude Chess GM</title>
  <link rel="stylesheet" href="/css/chess.css" />
</head>
<body>
  <div id="app">

    <div id="header">
      <h1>Claude Chess</h1>
      <div id="subtitle">Stockfish engine · Claude commentary</div>
    </div>

    <div id="difficulty-bar">
      <label>Level:</label>
      <button class="diff-btn" data-diff="beginner">Beginner</button>
      <button class="diff-btn" data-diff="intermediate">Intermediate</button>
      <button class="diff-btn" data-diff="advanced">Advanced</button>
      <button class="diff-btn" data-diff="master">Master</button>
      <button class="diff-btn" data-diff="grandmaster">GM</button>
    </div>

    <div id="sf-status"></div>
    <div id="status-bar">Loading engine...</div>

    <div id="board-wrap">
      <div id="board-container">
        <div id="board"></div>
        <div id="result-overlay">
          <div id="result-text"></div>
          <div id="result-btns">
            <button class="btn-overlay secondary" onclick="requestAnalysis()">Analyze Game</button>
            <button class="btn-overlay primary" onclick="resetGame()">New Game</button>
          </div>
        </div>
      </div>
    </div>

    <div id="controls">
      <button class="ctrl" id="btn-undo" onclick="undoMove()">Undo</button>
      <button class="ctrl primary" id="btn-hint" onclick="requestHint()">Hint</button>
      <button class="ctrl" onclick="flipBoard()">Flip</button>
      <button class="ctrl" onclick="resetGame()">New Game</button>
    </div>

    <div id="commentary-wrap">
      <div id="commentary-icon">♟</div>
      <div id="commentary-text" class="muted">Make your first move to begin.</div>
    </div>

    <div id="move-log-wrap">
      <div id="move-log"></div>
    </div>

    <div id="analysis-wrap">
      <div id="analysis-title">Game Analysis</div>
      <div id="analysis-text"></div>
    </div>

  </div>

  <script src="/js/chess-engine.js"></script>
  <script src="/js/stockfish-bridge.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
