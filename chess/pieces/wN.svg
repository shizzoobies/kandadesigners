<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#c8b890"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#sh)" fill="url(#wg)" stroke="#a09070" stroke-width="1.5" stroke-linejoin="round">
    <!-- Horse head - classic Staunton knight profile -->
    <path d="
      M72 92
      L72 70
      C72 58 76 50 80 42
      C84 34 86 26 82 20
      C78 14 70 12 62 14
      L56 8
      L58 16
      C52 18 46 22 42 28
      C38 34 36 40 36 46
      L32 48
      L38 54
      C40 58 40 64 38 70
      L38 92
      Z"/>
    <!-- Ear -->
    <path d="M62 14 L56 8 L66 10" fill="url(#wg)" stroke="#a09070" stroke-width="1.2"/>
    <!-- Eye -->
    <circle cx="58" cy="28" r="2.5" fill="#a09070" stroke="none"/>
    <!-- Nostril -->
    <circle cx="40" cy="44" r="1.8" fill="#a09070" stroke="none"/>
    <!-- Mouth line -->
    <path d="M36 46 C38 48 40 49 42 48" fill="none" stroke="#a09070" stroke-width="1"/>
    <!-- Mane -->
    <path d="M70 18 C74 24 76 32 76 40" fill="none" stroke="#a09070" stroke-width="2" stroke-linecap="round"/>
    <!-- Base rim -->
    <rect x="32" y="92" width="46" height="8" rx="3"/>
    <!-- Base -->
    <rect x="28" y="100" width="54" height="12" rx="4"/>
  </g>
</svg>
