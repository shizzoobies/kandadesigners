<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#sh)" fill="url(#bg)" stroke="#000" stroke-width="1.5" stroke-linejoin="round">
    <!-- Ball head -->
    <circle cx="64" cy="28" r="16"/>
    <!-- Neck -->
    <rect x="56" y="42" width="16" height="10" rx="4"/>
    <!-- Collar -->
    <ellipse cx="64" cy="54" rx="14" ry="5"/>
    <!-- Body -->
    <path d="M52 56 Q48 74 44 92 L84 92 Q80 74 76 56 Z"/>
    <!-- Base rim -->
    <rect x="38" y="92" width="52" height="8" rx="3"/>
    <!-- Base -->
    <rect x="34" y="100" width="60" height="12" rx="4"/>
  </g>
</svg>
