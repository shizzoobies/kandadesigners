<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#c8b890"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#sh)" fill="url(#wg)" stroke="#a09070" stroke-width="1.5" stroke-linejoin="round">
    <!-- Mitre tip -->
    <circle cx="64" cy="14" r="4"/>
    <!-- Mitre hat -->
    <path d="M64 18 Q50 30 46 48 L82 48 Q78 30 64 18 Z"/>
    <!-- Mitre slit -->
    <line x1="64" y1="22" x2="64" y2="42" stroke="#a09070" stroke-width="2" fill="none"/>
    <!-- Band -->
    <rect x="44" y="48" width="40" height="8" rx="3"/>
    <!-- Collar -->
    <ellipse cx="64" cy="60" rx="16" ry="5"/>
    <!-- Body -->
    <path d="M50 62 Q46 76 44 92 L84 92 Q82 76 78 62 Z"/>
    <!-- Base rim -->
    <rect x="38" y="92" width="52" height="8" rx="3"/>
    <!-- Base -->
    <rect x="34" y="100" width="60" height="12" rx="4"/>
  </g>
</svg>
