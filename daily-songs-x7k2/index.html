<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Songs</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- AUTH GATE -->
    <section id="view-auth" class="view hidden">
      <div class="auth-card">
        <h1 class="app-title">Daily Songs</h1>
        <p class="auth-subtitle">Enter passphrase to continue.</p>
        <div id="auth-error" class="error-msg hidden"></div>
        <form id="auth-form" autocomplete="off">
          <input
            type="password"
            id="passphrase-input"
            class="passphrase-input"
            placeholder="Passphrase"
            autocomplete="current-password"
            required
          >
          <button type="submit" id="auth-btn" class="btn-primary">Enter</button>
        </form>
      </div>
    </section>

    <!-- GENERATOR (also used for loading state) -->
    <section id="view-generator" class="view hidden">
      <div class="generator-content">
        <h1 class="app-title">Daily Songs</h1>
        <div class="controls">
          <div class="select-wrapper">
            <label for="lane-select" class="lane-label">Lane</label>
            <select id="lane-select" class="lane-select"></select>
          </div>
          <div class="select-wrapper">
            <label for="duration-select" class="lane-label">Duration</label>
            <select id="duration-select" class="lane-select"></select>
          </div>
          <button id="generate-btn" class="btn-primary btn-generate">Generate 5 Songs</button>
        </div>
        <div id="generate-error" class="error-msg hidden"></div>
        <p class="date-footer" id="today-date"></p>
        <div class="generator-links">
          <button id="history-btn" class="btn-text">View History</button>
          <span class="link-sep">·</span>
          <button id="bangers-btn" class="btn-text">Bangers</button>
          <span class="link-sep">·</span>
          <button id="import-btn" class="btn-text">Import</button>
        </div>
      </div>
    </section>

    <!-- RESULTS -->
    <section id="view-results" class="view hidden">
      <div class="results-content">
        <div class="results-header">
          <h2 class="results-lane-label" id="results-lane-name"></h2>
          <p class="results-date hidden" id="results-date"></p>
        </div>
        <div id="songs-container"></div>
        <div class="results-actions">
          <button id="regen-btn" class="btn-primary">Generate 5 More</button>
          <button id="change-lane-btn" class="btn-secondary">Change Lane</button>
          <button id="back-to-history-btn" class="btn-secondary hidden">Back to History</button>
        </div>
      </div>
    </section>

    <!-- HISTORY -->
    <section id="view-history" class="view hidden">
      <div class="history-content">
        <div class="history-header">
          <button id="history-back-btn" class="btn-back">Back</button>
          <h2 class="history-title">History</h2>
          <button id="history-sort-btn" class="btn-sort">A-Z</button>
        </div>
        <input
          type="search"
          id="history-search"
          class="history-search"
          placeholder="Search lanes..."
          autocomplete="off"
        >
        <div id="history-list"></div>
      </div>
    </section>

    <!-- BANGERS -->
    <section id="view-bangers" class="view hidden">
      <div class="history-content">
        <div class="history-header">
          <button id="bangers-back-btn" class="btn-back">Back</button>
          <h2 class="history-title">Bangers</h2>
          <button id="bangers-sort-btn" class="btn-sort">A-Z</button>
        </div>
        <input
          type="search"
          id="bangers-search"
          class="history-search"
          placeholder="Search title or lane..."
          autocomplete="off"
        >
        <div id="bangers-list"></div>
      </div>
    </section>

    <!-- IMPORT -->
    <section id="view-import" class="view hidden">
      <div class="history-content">
        <div class="history-header">
          <button id="import-back-btn" class="btn-back">Back</button>
          <h2 class="history-title">Import Songs</h2>
        </div>
        <p class="import-instructions">Paste the JSON from a Claude chat session. It saves directly to your history.</p>
        <div id="import-parse-status" class="import-parse-status"></div>
        <textarea
          id="import-textarea"
          class="import-textarea"
          placeholder='{ "lane": "Cinematic Tech Underscore", "songs": [ { "title": "...", "prompt": "...", "description": "...", "tags": "..." } ] }'
          spellcheck="false"
        ></textarea>
        <div id="import-error" class="error-msg hidden"></div>
        <button id="import-save-btn" class="btn-primary" disabled>Save to History</button>
      </div>
    </section>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
